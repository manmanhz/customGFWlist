# 动态聚合版策略
# 所有 provider 自动注入；地区组按所有订阅的 node_mapping 聚合生成。

proxy-providers:
${PROXY_PROVIDERS}

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
${NODE_SELECT_PROXIES}

  - name: 🤖 AI服务
    type: select
    proxies:
${AI_SELECT_PROXIES}

  - name: 📹 媒体&开发
    type: select
    proxies:
${MEDIA_SELECT_PROXIES}

  - name: 🇬 谷歌服务
    type: select
    proxies:
      - 🤖 AI服务
      - 📹 媒体&开发
      - 🚀 节点选择
      - DIRECT

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

${REGION_GROUPS}

rule-providers:
