# 极简版策略 (界面清爽，后台自动)
# ---------------------------------------------------
# 使用说明:
# 1. 替换下方的 SUBSCRIBE_URL_A、SUBSCRIBE_URL_B、SUBSCRIBE_URL_C 为你自己的机场订阅链接
# 2. provider-C 为可选，后续可替代 provider-A；不用 C 时可留空或与 A 填同一链接
# 3. 确保订阅链接格式为 clash/clashmeta 兼容格式
# 4. 手机端导入后会自动从 URL 获取节点列表

proxy-providers:
  provider-A:
    type: http
    url: ${SUBSCRIBE_URL_A}  # 替换为你的订阅链接1 (支持 cl=1 或 clash=1 后缀)
    interval: 86400
    path: ./providers/provider-a.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

  provider-B:
    type: http
    url: ${SUBSCRIBE_URL_B}  # 替换为你的订阅链接2 (按量付费/备用)
    interval: 86400
    path: ./providers/provider-b.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

  # 后续可替代 provider-A (替换 SUBSCRIBE_URL_C 为 C 源订阅链接)
  provider-C:
    type: http
    url: ${SUBSCRIBE_URL_C}
    interval: 86400
    path: ./providers/maoxiong26.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

proxy-groups:
  # === 1. 主控开关 (界面最显眼) ===
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动优选
      - 🅰️ A-包月(全地区)
      - 🅱️ B-按量(全地区)
      - 🅲 C-包月(全地区)
      - DIRECT

  # === 2. AI 专用 (手动/自动挡) ===
  # 建议: 手动选择一个稳定的节点，避免自动跳动触发风控
  - name: 🤖 AI服务
    type: select
    proxies:
       - 🇺🇸 B-美国-AI
       - 🇯🇵 B-日本-AI
       - 🇸🇬 B-新加坡-AI
       - 🇺🇸 C-美国-AI
       - 🇯🇵 C-日本-AI
       - 🇸🇬 C-新加坡-AI
       - 🇺🇸 A-美国
       - 🇯🇵 A-日本
       - 🇸🇬 A-新加坡
       - 🇹🇼 A-台湾
       - ♻️ 自动优选

  # === 3. 大流量场景 (媒体/下载/开发) ===
  - name: 📹 媒体&开发
    type: select
    proxies:
      - 🅰️ A-包月(全地区)
      - 🅲 C-包月(全地区)  # 后续可替代 A
      - 🇭🇰 A-香港
      - 🇹🇼 A-台湾
      - 🇸🇬 A-新加坡
      - 🇺🇸 A-美国
      - 🇯🇵 A-日本

  # === 4. Google 专属 ===
  - name: 🇬 谷歌服务
    type: select
    proxies:
      - 🤖 AI服务
      - 🅰️ A-包月(全地区)
      - 🅲 C-包月(全地区)  # 后续可替代 A
      - 📹 媒体&开发
      - 🚀 节点选择

  # === 5. 兜底 ===
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - 🅰️ A-包月(全地区)
      - 🅲 C-包月(全地区)
      - DIRECT

  # === 6. 广告拦截 ===
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  # === 后台隐形组 (节点池) ===
  - name: ♻️ 自动优选
    type: url-test
    use: [provider-A, provider-B, provider-C]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🅰️ A-包月(全地区)
    type: url-test
    use: [provider-A]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🅱️ B-按量(全地区)
    type: url-test
    use: [provider-B]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🅲 C-包月(全地区)
    type: url-test
    use: [provider-C]
    filter: '^(?!.*福利).*'   # 排除名字含「福利」的节点，福利仅用于 Emby
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  # C 源「福利」节点仅用于 Emby (节点名如 🇭🇰 福利-V114-香港-0.1x-仅限emby)
  - name: 🎬 Emby
    type: url-test
    use: [provider-C]
    filter: '福利'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇺🇸 B-美国-AI
    type: url-test
    use: [provider-B]
    filter: '(?i)(美国|US|States)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇯🇵 B-日本-AI
    type: url-test
    use: [provider-B]
    filter: '(?i)(日本|JP|Japan)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇸🇬 B-新加坡-AI
    type: url-test
    use: [provider-B]
    filter: '(?i)(新加坡|SG|Singapore)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇺🇸 C-美国-AI
    type: url-test
    use: [provider-C]
    filter: '^(?!.*福利).*(?i)(美国|US|States)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇯🇵 C-日本-AI
    type: url-test
    use: [provider-C]
    filter: '^(?!.*福利).*(?i)(日本|JP|Japan)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇸🇬 C-新加坡-AI
    type: url-test
    use: [provider-C]
    filter: '^(?!.*福利).*(?i)(新加坡|SG|Singapore)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇭🇰 A-香港
    type: url-test
    use: [provider-A]
    filter: '(?i)(香港|HK|Hong Kong)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇹🇼 A-台湾
    type: url-test
    use: [provider-A]
    filter: '(?i)(台湾|TW|TaiWan)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇺🇸 A-美国
    type: url-test
    use: [provider-A]
    filter: '(?i)(美国|US|States)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇯🇵 A-日本
    type: url-test
    use: [provider-A]
    filter: '(?i)(日本|JP|Japan)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇸🇬 A-新加坡
    type: url-test
    use: [provider-A]
    filter: '(?i)(新加坡|SG|Singapore)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

